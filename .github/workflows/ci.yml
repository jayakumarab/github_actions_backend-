name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout Source Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install Dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # Step 4: Run Tests
      - name: Run Tests
        run: |
          pytest

      # Step 5: Login DockerHub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t mybackendapp:latest .

      # Step 7: Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag mybackendapp:latest username/mybackendapp:latest

      # Step 8: Push Docker Image
      - name: Push Docker Image
        run: |
          docker push username/mybackendapp:latest